<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Notes - Smart Summarizer</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; }
        body { background: #f4f6f9; color: #222; padding: 20px; line-height: 1.5; }
        header { text-align: center; margin-bottom: 30px; }
        header h1 { color: #4361ee; margin-bottom: 5px; }
        textarea { width: 100%; height: 150px; padding: 12px; border: 2px solid #ccc; border-radius: 8px; resize: vertical; font-size: 16px; margin-bottom: 10px; }
        button { background: #4361ee; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 15px; margin-right: 8px; margin-top: 5px; }
        button:hover { background: #3a0ca3; }
        button:disabled { background: #888; cursor: not-allowed; }
        .output-section, .saved-section { background: white; padding: 15px; border-radius: 10px; margin-top: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .note-card { background: #f8f9fa; padding: 10px; margin: 8px 0; border-radius: 6px; border-left: 4px solid #4361ee; }
        .note-card h3 { margin-bottom: 5px; font-size: 16px; }
        .note-actions { margin-top: 5px; }
        .note-actions button { padding: 5px 10px; font-size: 13px; }
        .export-btn { background: #2a9d8f; }
        .delete-btn { background: #e63946; }
        @media (max-width: 600px) {
            button { width: 100%; margin: 5px 0; }
        }
    </style>
</head>
<body>
    <header>
        <h1>🤖 AI Notes</h1>
        <p>Paste text. Get instant summaries. Save & export.</p>
    </header>

    <main>
        <section class="input-section">
            <textarea id="inputText" placeholder="Paste your article, lecture notes, or research here..."></textarea>
            <button id="summarizeBtn">✨ Summarize</button>
        </section>

        <section class="output-section" id="outputSection" style="display:none;">
            <h2>📝 Summary</h2>
            <p id="summaryOutput"></p>
            <button id="saveBtn">💾 Save Note</button>
        </section>

        <section class="saved-section">
            <h2>📚 Saved Notes</h2>
            <div id="savedNotes"></div>
        </section>
    </main>

    <script>
        // 1️⃣ Grab elements from HTML
        const inputText = document.getElementById('inputText');
        const summarizeBtn = document.getElementById('summarizeBtn');
        const outputSection = document.getElementById('outputSection');
        const summaryOutput = document.getElementById('summaryOutput');
        const saveBtn = document.getElementById('saveBtn');
        const savedNotesDiv = document.getElementById('savedNotes');

        let currentSummary = '';

        // 2️⃣ Simple AI-like summarizer (works offline, no API needed)
        function summarizeText(text) {
            if (!text.trim()) return "⚠️ Please enter some text first.";
            const sentences = text.match(/[^\.!\?]+[\.!\?]+/g);
            if (!sentences || sentences.length < 2) return "📝 Text too short to summarize. Add more sentences.";

            // Count word frequency
            const words = text.toLowerCase().match(/\b\w+\b/g);
            const freq = {};
            words.forEach(w => freq[w] = (freq[w] || 0) + 1);

            // Score sentences by important words
            const scored = sentences.map(s => {
                const sWords = s.toLowerCase().match(/\b\w+\b/g) || [];
                let score = 0;
                sWords.forEach(w => score += (freq[w] || 0));
                return { text: s.trim(), score: score / sWords.length };
            });

            // Pick top 3 sentences
            scored.sort((a, b) => b.score - a.score);
            return scored.slice(0, 3).map(s => s.text).join(' ');
        }

        // 3️⃣ Button: Summarize
        summarizeBtn.addEventListener('click', () => {
            summarizeBtn.textContent = "⏳ Processing...";
            summarizeBtn.disabled = true;

            setTimeout(() => {
                currentSummary = summarizeText(inputText.value);
                summaryOutput.textContent = currentSummary;
                outputSection.style.display = "block";
                summarizeBtn.textContent = "✨ Summarize";
                summarizeBtn.disabled = false;
            }, 800);
        });

        // 4️⃣ Button: Save Note
        saveBtn.addEventListener('click', () => {
            if (!currentSummary) return;
            const notes = JSON.parse(localStorage.getItem('aiNotes') || '[]');
            const newNote = {
                id: Date.now(),
                text: inputText.value.substring(0, 30) + '...',
                summary: currentSummary,
                date: new Date().toLocaleDateString()
            };
            notes.unshift(newNote);
            localStorage.setItem('aiNotes', JSON.stringify(notes));
            renderNotes();
            alert("✅ Note saved!");
        });

        // 5️⃣ Render saved notes
        function renderNotes() {
            const notes = JSON.parse(localStorage.getItem('aiNotes') || '[]');
            savedNotesDiv.innerHTML = '';
            if (notes.length === 0) {
                savedNotesDiv.innerHTML = '<p style="color:#666">No notes saved yet.</p>';
                return;
            }
            notes.forEach(note => {
                const div = document.createElement('div');
                div.className = 'note-card';
                div.innerHTML = `
                    <h3>${note.text}</h3>
                    <p><strong>Summary:</strong> ${note.summary}</p>
                    <p style="font-size:12px;color:#888">📅 ${note.date}</p>
                    <div class="note-actions">
                        <button class="export-btn" onclick="exportNote('${note.id}')">📤 Export</button>
                        <button class="delete-btn" onclick="deleteNote(${note.id})">🗑️ Delete</button>
                    </div>
                `;
                savedNotesDiv.appendChild(div);
            });
        }

        // 6️⃣ Delete note
        window.deleteNote = function(id) {
            let notes = JSON.parse(localStorage.getItem('aiNotes') || '[]');
            notes = notes.filter(n => n.id != id);
            localStorage.setItem('aiNotes', JSON.stringify(notes));
            renderNotes();
        };

        // 7️⃣ Export note as .txt
        window.exportNote = function(id) {
            const notes = JSON.parse(localStorage.getItem('aiNotes') || '[]');
            const note = notes.find(n => n.id == id);
            if (!note) return;
            const content = `TITLE: ${note.text}\nDATE: ${note.date}\nSUMMARY:\n${note.summary}`;
            const blob = new Blob([content], { type: 'text/plain' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `note-${note.id}.txt`;
            a.click();
        };

        // Load notes on page open
        renderNotes();
    </script>
</body>
</html>
